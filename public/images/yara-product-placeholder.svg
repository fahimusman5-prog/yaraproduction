<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">YARA product placeholder</title>
  <desc id="desc">A soft ivory and rose placeholder image for YARA skincare products.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf5"/>
      <stop offset="0.52" stop-color="#f7e7df"/>
      <stop offset="1" stop-color="#ead2ca"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4dfd6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="32" stdDeviation="32" flood-color="#4b1823" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="238" cy="256" r="132" fill="#ffffff" opacity="0.48"/>
  <circle cx="980" cy="890" r="170" fill="#b98375" opacity="0.12"/>
  <g filter="url(#shadow)">
    <rect x="435" y="250" width="330" height="690" rx="54" fill="url(#bottle)"/>
    <rect x="510" y="174" width="180" height="104" rx="28" fill="#7b2435"/>
    <rect x="474" y="412" width="252" height="260" rx="34" fill="#fffaf5" opacity="0.88"/>
    <text x="600" y="520" text-anchor="middle" fill="#7b2435" font-family="Georgia, 'Times New Roman', serif" font-size="78" letter-spacing="8">YARA</text>
    <text x="600" y="590" text-anchor="middle" fill="#9a6d63" font-family="Arial, sans-serif" font-size="24" letter-spacing="5">PRODUCTIONS</text>
  </g>
  <text x="600" y="1040" text-anchor="middle" fill="#7b2435" font-family="Arial, sans-serif" font-size="28" letter-spacing="4">PRODUCT PHOTO COMING SOON</text>
</svg>
